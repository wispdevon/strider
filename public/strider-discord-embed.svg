<svg xmlns="http://www.w3.org/2000/svg" width="1200" height="630" viewBox="0 0 1200 630" role="img" aria-labelledby="title description">
  <title id="title">Strider Flow</title>
  <desc id="description">A warm paper project flowboard moving work from Plan to Active to Review.</desc>
  <defs>
    <pattern id="dot-grid" width="18" height="18" patternUnits="userSpaceOnUse">
      <circle cx="1.5" cy="1.5" r="1.2" fill="#17181b" opacity="0.09" />
    </pattern>
    <linearGradient id="paper-light" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0" stop-color="#ffffff" stop-opacity="0.34" />
      <stop offset="1" stop-color="#ffffff" stop-opacity="0.02" />
    </linearGradient>
    <linearGradient id="titanium" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0" stop-color="#34373c" />
      <stop offset="0.55" stop-color="#1d1f23" />
      <stop offset="1" stop-color="#111215" />
    </linearGradient>
    <linearGradient id="progress" x1="0" y1="0" x2="1" y2="0">
      <stop offset="0" stop-color="#1d1f23" />
      <stop offset="1" stop-color="#b8b4ab" />
    </linearGradient>
    <filter id="soft-shadow" x="-20%" y="-20%" width="140%" height="160%">
      <feDropShadow dx="0" dy="14" stdDeviation="18" flood-color="#111111" flood-opacity="0.09" />
    </filter>
    <filter id="mark-shadow" x="-30%" y="-30%" width="160%" height="180%">
      <feDropShadow dx="0" dy="10" stdDeviation="12" flood-color="#111111" flood-opacity="0.18" />
    </filter>
  </defs>

  <rect width="1200" height="630" fill="#efece6" />
  <rect width="1200" height="630" fill="url(#dot-grid)" />
  <rect width="1200" height="630" fill="url(#paper-light)" />

  <g transform="translate(74 66)">
    <g filter="url(#mark-shadow)">
      <rect width="72" height="72" rx="14" fill="url(#titanium)" />
      <path d="M20 23h31M20 36h23M20 49h31" fill="none" stroke="#f8f6f2" stroke-width="5" stroke-linecap="round" />
      <path d="m46 31 8 5-8 5" fill="none" stroke="#b8b4ab" stroke-width="3" stroke-linecap="round" stroke-linejoin="round" />
    </g>
    <text x="94" y="29" fill="#17181b" font-family="Space Grotesk, Arial, sans-serif" font-size="28" font-weight="700" letter-spacing="3">STRIDER FLOW</text>
    <text x="94" y="58" fill="#6e7379" font-family="Inter, Arial, sans-serif" font-size="17" font-weight="500">PROJECT WORKSPACES</text>
  </g>

  <g transform="translate(74 190)">
    <text fill="#17181b" font-family="Space Grotesk, Arial, sans-serif" font-size="76" font-weight="700" letter-spacing="-2">
      Work moves forward.
    </text>
    <text y="62" fill="#6e7379" font-family="Inter, Arial, sans-serif" font-size="24" font-weight="500">
      Plan clearly. Collaborate closely. Finish what matters.
    </text>
  </g>

  <g transform="translate(74 358)" filter="url(#soft-shadow)">
    <g>
      <rect width="320" height="204" rx="16" fill="#f8f6f2" stroke="#17181b" stroke-opacity="0.12" />
      <text x="24" y="37" fill="#6e7379" font-family="Inter, Arial, sans-serif" font-size="13" font-weight="700" letter-spacing="2">PLAN</text>
      <rect x="24" y="58" width="272" height="116" rx="12" fill="#ffffff" fill-opacity="0.66" stroke="#17181b" stroke-opacity="0.1" />
      <text x="42" y="88" fill="#1d1f23" font-family="Inter, Arial, sans-serif" font-size="12" font-weight="700" letter-spacing="1.5">PRODUCT</text>
      <text x="42" y="119" fill="#17181b" font-family="Space Grotesk, Arial, sans-serif" font-size="21" font-weight="700">Shape the next release</text>
      <rect x="42" y="143" width="218" height="7" rx="3.5" fill="#e7e0d5" />
      <rect x="42" y="143" width="74" height="7" rx="3.5" fill="url(#progress)" />
    </g>

    <g transform="translate(366)">
      <rect width="320" height="204" rx="16" fill="#f8f6f2" stroke="#17181b" stroke-opacity="0.12" />
      <text x="24" y="37" fill="#6e7379" font-family="Inter, Arial, sans-serif" font-size="13" font-weight="700" letter-spacing="2">ACTIVE</text>
      <rect x="24" y="58" width="272" height="116" rx="12" fill="#1d1f23" />
      <text x="42" y="88" fill="#b8b4ab" font-family="Inter, Arial, sans-serif" font-size="12" font-weight="700" letter-spacing="1.5">DESIGN</text>
      <text x="42" y="119" fill="#f8f6f2" font-family="Space Grotesk, Arial, sans-serif" font-size="21" font-weight="700">Build with momentum</text>
      <rect x="42" y="143" width="218" height="7" rx="3.5" fill="#34373c" />
      <rect x="42" y="143" width="146" height="7" rx="3.5" fill="#d7d2c9" />
    </g>

    <g transform="translate(732)">
      <rect width="320" height="204" rx="16" fill="#f8f6f2" stroke="#17181b" stroke-opacity="0.12" />
      <text x="24" y="37" fill="#6e7379" font-family="Inter, Arial, sans-serif" font-size="13" font-weight="700" letter-spacing="2">REVIEW</text>
      <rect x="24" y="58" width="272" height="116" rx="12" fill="#ffffff" fill-opacity="0.66" stroke="#17181b" stroke-opacity="0.1" />
      <text x="42" y="88" fill="#1d1f23" font-family="Inter, Arial, sans-serif" font-size="12" font-weight="700" letter-spacing="1.5">LAUNCH</text>
      <text x="42" y="119" fill="#17181b" font-family="Space Grotesk, Arial, sans-serif" font-size="21" font-weight="700">Finish the work</text>
      <rect x="42" y="143" width="218" height="7" rx="3.5" fill="#e7e0d5" />
      <rect x="42" y="143" width="218" height="7" rx="3.5" fill="url(#progress)" />
    </g>
  </g>

  <g fill="none" stroke="#1d1f23" stroke-width="3" stroke-linecap="round" stroke-linejoin="round">
    <path d="M406 460h21" />
    <path d="m421 453 8 7-8 7" />
    <path d="M772 460h21" />
    <path d="m787 453 8 7-8 7" />
  </g>
</svg>
